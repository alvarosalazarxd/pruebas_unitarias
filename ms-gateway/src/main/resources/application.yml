spring:
  application:
    name: ms-gateway
  cloud:
    gateway:
      routes:
        
        - id: productos-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/productos/**

       
        - id: usuarios-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**

       
        - id: favoritos-route
          uri: http://localhost:8086
          predicates:
            - Path=/api/favoritos/**

       
        - id: pedidos-route
          uri: http://localhost:8083
          predicates:
            - Path=/api/pedidos/**

        
        - id: envios-route
          uri: http://localhost:8089
          predicates:
            - Path=/api/envios/**

        
        - id: resenas-route
          uri: http://localhost:8090
          predicates:
            - Path=/api/resenas/**
        - id: carrito-route
          uri: http://localhost:8085
          predicates:
            - Path=/api/carritos/**

        - id: notificaciones-route
          uri: http://localhost:8092
          predicates:
            - Path=/api/notificaciones/**
        - id: catalogo
          uri: http://localhost:8079/
          predicates:
            - Path=/api/catalogo/**
        -  id: inventario
           uri: http://localhost:8084/
           predicates:
            - Path=/api/inventario/**
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO